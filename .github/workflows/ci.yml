name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: pip install -e ".[dev]"
      - name: Run tests (offline, no API keys)
        run: pytest -q

  test-with-adapters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with adapter extras
        run: pip install -e ".[dev,langgraph]"
      - name: Run full suite (includes real-LangGraph integration test)
        run: pytest -q
